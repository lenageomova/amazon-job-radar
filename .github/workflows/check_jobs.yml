name: Amazon Jobs Checker

on:
  schedule:
    # Every 30 minutes from 07:00 to 23:30 America/Edmonton.
    # GitHub Actions cron uses UTC, so this matches 14:00-06:30 UTC for MST.
    - cron: "*/30 14-23,0-6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run job checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOCATION_KEYWORDS: ${{ vars.LOCATION_KEYWORDS }}
          JOB_TYPE_KEYWORDS: ${{ vars.JOB_TYPE_KEYWORDS }}
        run: python -m checker.main

      - name: Commit updated seen jobs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/seen_jobs.json
          git diff --staged --quiet || git commit -m "Update seen jobs [skip ci]"
          git push
